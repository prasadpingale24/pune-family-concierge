<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Pune Family Concierge</title>
    <style>
        body { font-family: 'Inter', sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background-color: #f8f9fa; color: #212529; }
        .header { margin-bottom: 2rem; }
        .result-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .reply-box { white-space: pre-wrap; margin: 1.5rem 0; line-height: 1.6; }
        .back-link { display: inline-block; margin-top: 1rem; color: #0d6efd; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .meta { color: #6c757d; font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-link">← New Search</a>
        <h1>Search Results</h1>
        <p>Query: "<strong>{{ query }}</strong>"</p>
    </div>

    <div class="result-container">
        <div class="reply-box">
            {{ reply | safe }}
        </div>
        
        <div class="meta">
            Intent detected: {{ intent }}
        </div>
    </div>
</body>
</html>
