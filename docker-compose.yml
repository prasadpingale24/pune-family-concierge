services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pune-family-concierge-api
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
