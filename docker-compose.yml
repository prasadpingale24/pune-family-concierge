services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pune-family-concierge-api
    env_file:
      - .env.dev
    environment:
      APP_ENV: dev
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
